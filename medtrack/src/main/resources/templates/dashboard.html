<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>MedTrack Dashboard</title>
	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
	<style>
		body { font-family: Arial, sans-serif; margin: 24px; }
		.container { max-width: 900px; margin: 0 auto; }
		h1 { font-size: 20px; }
		.card { padding: 16px; border: 1px solid #e0e0e0; border-radius: 8px; }
	</style>
</head>
<body>
<div class="container">
	<h1>Kullanici <span th:text="${memberId}"></span> - Son 7 Gun Kayitlari</h1>
	<div class="card">
		<canvas id="chart" height="120"></canvas>
	</div>
</div>

<script th:inline="javascript">
	
	// Chart.js yüklendikten sonra çalıştır
	window.addEventListener('DOMContentLoaded', function() {
		// Controller'dan gelen JSON string'i parse et
		const recordsJson = /*[[${recordsJson}]]*/ '[]';
		let records = [];
		
		try {
			records = JSON.parse(recordsJson);
		} catch (e) {
			console.error('JSON parse error:', e, 'JSON:', recordsJson);
			records = [];
		}
		
		// Verileri işle
		const labels = [];
		const weights = [];
		const pulses = [];
		
		for (let i = 0; i < records.length; i++) {
			const r = records[i];
			// LocalDate ISO format olarak gelir (yyyy-MM-dd)
			labels.push(r.recordDate || '');
			weights.push(r.weight || 0);
			pulses.push(r.pulse || 0);
		}
		
		console.log('Records JSON:', recordsJson);
		console.log('Records count:', records.length);
		console.log('Records:', records);
		console.log('Labels:', labels);
		console.log('Weights:', weights);
		console.log('Pulses:', pulses);
		
		// Chart.js'in yüklendiğini kontrol et
		if (typeof Chart === 'undefined') {
			console.error('Chart.js yüklenemedi!');
			return;
		}
		
		// Canvas element'ini bul
		const canvas = document.getElementById('chart');
		if (!canvas) {
			console.error('Canvas element bulunamadı!');
			return;
		}
		
		const ctx = canvas.getContext('2d');
		if (!ctx) {
			console.error('Canvas context alınamadı!');
			return;
		}
		
		// Grafik oluştur
		try {
			new Chart(ctx, {
				type: 'line',
				data: {
					labels: labels,
					datasets: [
						{ 
							label: 'Kilo (kg)', 
							data: weights, 
							borderColor: '#1976d2', 
							backgroundColor: 'rgba(25, 118, 210, 0.1)',
							tension: 0.3,
							yAxisID: 'y'
						},
						{ 
							label: 'Nabız (bpm)', 
							data: pulses, 
							borderColor: '#ef6c00', 
							backgroundColor: 'rgba(239, 108, 0, 0.1)',
							tension: 0.3,
							yAxisID: 'y1'
						}
					]
				},
				options: {
					responsive: true,
					maintainAspectRatio: true,
					plugins: { 
						legend: { 
							position: 'top',
							display: true
						} 
					},
					scales: { 
						y: { 
							type: 'linear',
							display: true,
							position: 'left',
							beginAtZero: false,
							title: {
								display: true,
								text: 'Kilo (kg)'
							}
						},
						y1: {
							type: 'linear',
							display: true,
							position: 'right',
							beginAtZero: false,
							grid: {
								drawOnChartArea: false
							},
							title: {
								display: true,
								text: 'Nabız (bpm)'
							}
						}
					}
				}
			});
			console.log('Grafik başarıyla oluşturuldu!');
		} catch (error) {
			console.error('Grafik oluşturulurken hata:', error);
		}
	});
	
</script>
</body>
</html>
